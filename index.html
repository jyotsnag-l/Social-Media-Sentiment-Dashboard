<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Sentiment Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Header Section -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1 class="dashboard-title">📊 Social Media Sentiment Dashboard</h1>
                <div class="header-controls">
                    <button class="btn btn--outline btn--sm theme-toggle" id="themeToggle">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <div class="last-update">
                        Last updated: <span id="lastUpdate">--</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Controls Panel -->
        <section class="controls-panel">
            <div class="controls-grid">
                <div class="control-group">
                    <label class="form-label" for="keywordInput">Keyword</label>
                    <input 
                        type="text" 
                        id="keywordInput" 
                        class="form-control" 
                        value="artificial intelligence"
                        placeholder="Enter keyword..."
                    >
                </div>
                
                <div class="control-group">
                    <label class="form-label" for="dateRange">Date Range</label>
                    <select id="dateRange" class="form-control">
                        <option value="1">1 day</option>
                        <option value="3">3 days</option>
                        <option value="7" selected>7 days</option>
                        <option value="14">14 days</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="form-label" for="updateInterval">Update Interval</label>
                    <select id="updateInterval" class="form-control">
                        <option value="10">10 seconds</option>
                        <option value="30" selected>30 seconds</option>
                        <option value="60">1 minute</option>
                        <option value="300">5 minutes</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="form-label" for="chartType">Chart Type</label>
                    <select id="chartType" class="form-control">
                        <option value="trend" selected>Trend Line</option>
                        <option value="distribution">Distribution</option>
                        <option value="volume">Volume Analysis</option>
                    </select>
                </div>

                <div class="control-group">
                    <button class="btn btn--primary refresh-btn" id="refreshData">
                        <span class="refresh-icon">🔄</span> Refresh
                    </button>
                </div>
            </div>
        </section>

        <!-- Metrics Cards -->
        <section class="metrics-section">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon">📊</div>
                    <div class="metric-content">
                        <div class="metric-label">Total Tweets</div>
                        <div class="metric-value" id="totalTweets">0</div>
                    </div>
                </div>

                <div class="metric-card positive">
                    <div class="metric-icon">😊</div>
                    <div class="metric-content">
                        <div class="metric-label">Positive</div>
                        <div class="metric-value" id="positiveTweets">0</div>
                        <div class="metric-percentage" id="positivePercentage">0%</div>
                    </div>
                </div>

                <div class="metric-card negative">
                    <div class="metric-icon">😔</div>
                    <div class="metric-content">
                        <div class="metric-label">Negative</div>
                        <div class="metric-value" id="negativeTweets">0</div>
                        <div class="metric-percentage" id="negativePercentage">0%</div>
                    </div>
                </div>

                <div class="metric-card neutral">
                    <div class="metric-icon">😐</div>
                    <div class="metric-content">
                        <div class="metric-label">Neutral</div>
                        <div class="metric-value" id="neutralTweets">0</div>
                        <div class="metric-percentage" id="neutralPercentage">0%</div>
                    </div>
                </div>

                <div class="metric-card sentiment">
                    <div class="metric-icon">🎯</div>
                    <div class="metric-content">
                        <div class="metric-label">Avg Sentiment</div>
                        <div class="metric-value" id="avgSentiment">0.00</div>
                        <div class="sentiment-indicator" id="sentimentIndicator"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Chart Area -->
        <section class="chart-section">
            <div class="chart-container" style="position: relative; height: 400px;">
                <div class="loading-overlay hidden" id="loadingOverlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Updating data...</div>
                </div>
                <canvas id="mainChart"></canvas>
            </div>
        </section>

        <!-- Auto-refresh indicator -->
        <div class="auto-refresh-indicator" id="autoRefreshIndicator">
            <div class="refresh-progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="refresh-text">Next update in: <span id="countdown">30</span>s</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
